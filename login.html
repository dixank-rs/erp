<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Portable ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="css/erp.css" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><i class="bi bi-box-seam-fill" aria-hidden="true"></i></div>
      <h1 class="login-title">Portable ERP</h1>
      <p class="login-tagline">Local server · Portable</p>
      <p class="login-hint">Sign in to your workspace</p>
    </div>

    <div id="alert-box" class="alert alert-danger d-none py-2 mb-3" role="alert"></div>

    <form id="login-form" class="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="role">Role</label>
        <select id="role" class="form-select" aria-describedby="role-help">
          <option value="">Choose role (fills username & password only)</option>
          <option value="admin">Admin</option>
          <option value="manager">Manager</option>
          <option value="operator">Operator</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text" aria-hidden="true"><i class="bi bi-person"></i></span>
          <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
          <button type="button" class="btn btn-outline-secondary login-toggle-pw" id="toggle-pw" aria-label="Show password"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
        <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-1" role="status" aria-hidden="true"></span>
        Sign in
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
if (ERPAPP.getUser()) { window.location.href = 'dashboard.html'; }

const ROLE_SAMPLES = {
  admin: { username: 'admin', password: 'admin123' },
  manager: { username: 'manager', password: 'mgr123' },
  operator: { username: 'operator', password: 'ops123' }
};

document.getElementById('role').addEventListener('change', function() {
  const v = this.value;
  if (v && ROLE_SAMPLES[v]) {
    document.getElementById('username').value = ROLE_SAMPLES[v].username;
    document.getElementById('password').value = ROLE_SAMPLES[v].password;
  }
});

document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const icon = this.querySelector('i');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; this.setAttribute('aria-label', 'Hide password'); }
  else { pw.type = 'password'; icon.className = 'bi bi-eye'; this.setAttribute('aria-label', 'Show password'); }
});

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alertBox = document.getElementById('alert-box');
  const btn = document.getElementById('login-btn');
  const spinner = document.getElementById('login-spinner');

  alertBox.classList.add('d-none');
  btn.disabled = true; spinner.classList.remove('d-none');

  setTimeout(() => {
    const ok = ERPAPP.login(username, password);
    if (ok) { window.location.href = 'dashboard.html'; }
    else {
      alertBox.textContent = 'Invalid username or password. Please check credentials.';
      alertBox.classList.remove('d-none');
      btn.disabled = false; spinner.classList.add('d-none');
    }
  }, 400);
});
</script>
</body>
</html>
